<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Shoplens AI Search</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    .product-img { width: 120px; height: 120px; object-fit: cover; border-radius: 8px; display: block; margin-bottom: 10px; }
    .result-card { border: 1px solid #ddd; padding: 20px; margin-top: 20px; border-radius: 12px; }
    .badge { padding: 4px 10px; border-radius: 6px; font-weight: bold; }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="logo">shoplens</div>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="search.html" class="active">AI Search</a>
    </div>
  </nav>

  <div class="page-hero">
    <h1>Shoplens <span class="ai-text">AI</span></h1>
    <p>Search Indian products and check safety.</p>
  </div>

  <div class="search-box">
    <div class="search-input-wrap">
      <input class="search-input" id="searchInput" placeholder="e.g. best budget smartphone..." />
      <button class="search-submit" onclick="doSearch()">Search</button>
    </div>
  </div>

  <!-- Suggestion Tags (Static) -->
  <div class="search-tags" style="margin-top:20px; text-align:center;">
    <span class="tag" onclick="quickSearch('best smartphones in India')">📱 Budget Phones</span>
    <span class="tag" onclick="quickSearch('is this website a scam')">⚠️ Scam Check</span>
    <span class="tag" onclick="quickSearch('best running shoes India')">👟 Running Shoes</span>
  </div>

  <div class="results-grid" id="resultsGrid"></div>

  <script>
    function quickSearch(q) {
      document.getElementById('searchInput').value = q;
      doSearch();
    }

    async function doSearch() {
      const query = document.getElementById('searchInput').value.trim();
      if (!query) return;
      const grid = document.getElementById('resultsGrid');
      grid.innerHTML = '<p style="text-align:center; padding:40px;">🔍 Searching Indian market...</p>';

      const res = await fetch('/api/search', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ query })
      });
      const data = await res.json();

      grid.innerHTML = data.results.map(r => `
        <div class="result-card">
          ${r.image ? `<img src="${r.image}" class="product-img">` : ''}
          <h3>${r.name}</h3>
          <p>${r.description}</p>
          <p><strong>Price:</strong> ${r.price} | ⭐ ${r.rating}</p>
          <p>Status: <span class="badge" style="background:${r.status === 'scam' ? '#ffcccb' : '#ccffcc'}">${r.status.toUpperCase()}</span></p>
          <a href="${r.url}" target="_blank" style="color:blue;">Visit Store</a>
        </div>
      `).join('');
    }
  </script>
</body>
</html>
