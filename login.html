<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Shoplens</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/auth-ui-web@latest"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; background-color: #f4f4f9; }
        #auth-container { width: 90%; max-width: 400px; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    </style>
</head>
<body>

<div id="auth-container"></div>

<script>
    // 1. Replace these with your actual keys from Supabase Settings -> API
    const SUPABASE_URL = 'YOUR_PROJECT_URL';
    const SUPABASE_ANON_KEY = 'YOUR_ANON_KEY';
    
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // 2. This creates the login box automatically
    const ui = new supabase.AuthUI(supabase);
    ui.render('#auth-container', {
        providers: ['google'], // Enables Google Login
        view: 'sign_up' 
    });

    // 3. Send the user to your search page after they log in
    supabase.auth.onAuthStateChange((event, session) => {
        if (event === 'SIGNED_IN') {
            window.location.href = 'search.html';
        }
    });
</script>
</body>
</html>
